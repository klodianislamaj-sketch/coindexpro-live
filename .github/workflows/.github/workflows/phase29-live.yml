name: phase29-live

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RUN to execute'
        required: true
        default: ''

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  BACKUP_BUCKET: ${{ vars.BACKUP_BUCKET }}
  STAGING_NAMESPACE: ${{ vars.STAGING_NAMESPACE }}

jobs:
  phase29:
    runs-on: ubuntu-latest

    steps:
      - name: Guard
        run: |
          [ "${{ github.event.inputs.confirm }}" = "RUN" ] || exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Stage 0
        run: |
          mkdir -p artifacts
          go version
          docker --version
          kubectl version --client
          aws sts get-caller-identity

      - name: Stage 1 Bootstrap
        run: |
          chmod +x bootstrap/provision-staging.sh
          ./bootstrap/provision-staging.sh

      - name: Stage 2 Build
        run: |
          chmod +x scripts/phase21-run.sh
          go test ./...

      - name: Stage 3 Launch Gate
        run: |
          chmod +x scripts/launch-gate.sh
          ./scripts/launch-gate.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase29-live-artifacts
          path: artifacts/**
